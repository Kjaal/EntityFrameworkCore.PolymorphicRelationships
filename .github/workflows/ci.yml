name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  DOTNET_NOLOGO: true

jobs:
  test-windows:
    name: Windows Smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "EntityFrameworkCore.PolymorphicRelationships.sln"

      - name: Test library suite
        run: dotnet test "EntityFrameworkCore.PolymorphicRelationships.sln" --configuration Release --no-restore

  test-linux-postgres:
    name: Linux PostgreSQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POLYMORPHIC_TEST_POSTGRES: Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "EntityFrameworkCore.PolymorphicRelationships.sln"

      - name: Test library suite with PostgreSQL
        run: dotnet test "EntityFrameworkCore.PolymorphicRelationships.sln" --configuration Release --no-restore

  test-linux-mysql:
    name: Linux MySQL
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: mysql
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pmysql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      POLYMORPHIC_TEST_MYSQL: Server=127.0.0.1;Port=3306;Database=mysql;User=root;Password=mysql;SslMode=None;AllowPublicKeyRetrieval=True

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "EntityFrameworkCore.PolymorphicRelationships.sln"

      - name: Test library suite with MySQL
        run: dotnet test "EntityFrameworkCore.PolymorphicRelationships.sln" --configuration Release --no-restore

  test-linux-sqlserver:
    name: Linux SQL Server
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: Strong!Passw0rd
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Strong!Passw0rd -Q 'SELECT 1' -C || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 15

    env:
      POLYMORPHIC_TEST_SQLSERVER: Server=localhost,1433;User ID=sa;Password=Strong!Passw0rd;TrustServerCertificate=True;Encrypt=False;Database=master

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "EntityFrameworkCore.PolymorphicRelationships.sln"

      - name: Test library suite with SQL Server
        run: dotnet test "EntityFrameworkCore.PolymorphicRelationships.sln" --configuration Release --no-restore

  package:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs:
      - test-windows
      - test-linux-postgres
      - test-linux-mysql
      - test-linux-sqlserver

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "EntityFrameworkCore.PolymorphicRelationships.sln"

      - name: Build package project
        run: dotnet build "src/EntityFrameworkCore.PolymorphicRelationships/EntityFrameworkCore.PolymorphicRelationships.csproj" --configuration Release --no-restore

      - name: Pack NuGet package
        run: dotnet pack "src/EntityFrameworkCore.PolymorphicRelationships/EntityFrameworkCore.PolymorphicRelationships.csproj" --configuration Release --no-build --output artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polymorphicrelationships-package
          path: artifacts/*
