name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-windows:
    name: Windows Smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "EntityFrameworkCore.PolymorphicRelationships.sln"

      - name: Test library suite
        run: dotnet test "EntityFrameworkCore.PolymorphicRelationships.sln" --configuration Release --no-restore

  test-linux-postgres:
    name: Linux PostgreSQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POLYMORPHIC_TEST_POSTGRES: Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "EntityFrameworkCore.PolymorphicRelationships.sln"

      - name: Test library suite with PostgreSQL
        run: dotnet test "EntityFrameworkCore.PolymorphicRelationships.sln" --configuration Release --no-restore
